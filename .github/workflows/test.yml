name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run unit tests (excludes Supabase integration tests)
        run: npx vitest run --exclude 'src/__tests__/decks.crud.test.ts' --exclude 'src/__tests__/cards.crud.test.ts' --exclude 'src/__tests__/supabase.client.test.ts'
